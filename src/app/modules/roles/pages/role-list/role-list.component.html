<div class="container app-data-page">
  <div class="header app-data-page__header">
    <h1 class="app-data-page__title">Roles</h1>
    <div class="app-data-page__actions">
      <button mat-flat-button color="primary" routerLink="/app/roles/create" type="button">
        Crear rol
      </button>
    </div>
  </div>

  <mat-card appearance="outlined" class="app-data-page__card">
    <mat-card-content class="app-data-page__card-body">
      <div class="app-data-page__scroll">
        <table mat-table [dataSource]="roles">
          <ng-container matColumnDef="name">
            <th mat-header-cell *matHeaderCellDef>Nombre</th>
            <td mat-cell *matCellDef="let role">{{ role.name }}</td>
          </ng-container>

          <ng-container matColumnDef="description">
            <th mat-header-cell *matHeaderCellDef>Descripción</th>
            <td mat-cell *matCellDef="let role">{{ role.description }}</td>
          </ng-container>

          <ng-container matColumnDef="actions">
            <th mat-header-cell *matHeaderCellDef>Acciones</th>
            <td mat-cell *matCellDef="let role">
              <button mat-icon-button [routerLink]="['/app/roles/edit', role._id]" type="button" matTooltip="Editar">
                <mat-icon>edit</mat-icon>
              </button>
              <button mat-icon-button (click)="deleteRole(role._id)" type="button" color="warn" matTooltip="Eliminar">
                <mat-icon>delete</mat-icon>
              </button>
            </td>
          </ng-container>

          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
        </table>
      </div>
    </mat-card-content>
  </mat-card>
</div>
