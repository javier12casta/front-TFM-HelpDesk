<div class="assign-ticket-dialog">
  <h2 mat-dialog-title class="assign-ticket-dialog__title">
    {{ data.ticket.assignedTo ? 'Reasignar ticket' : 'Asignar ticket' }}
  </h2>
  <p class="assign-ticket-dialog__subtitle">
    <span>Ticket #{{ data.ticket.ticketNumber }}</span>
    <ng-container *ngIf="data.ticket.description as desc">
      <span class="assign-ticket-dialog__preview">
        — {{ desc.length > 72 ? (desc | slice : 0 : 72) + '…' : desc }}
      </span>
    </ng-container>
  </p>

  <mat-dialog-content>
    <form [formGroup]="assignForm" class="assign-form">
      <mat-form-field appearance="fill" hideRequiredMarker>
        <mat-label>Agente de soporte</mat-label>
        <mat-select formControlName="userId">
          <mat-option *ngFor="let user of supportUsers" [value]="user._id">
            {{ user.username }}
          </mat-option>
        </mat-select>
        <mat-hint *ngIf="supportUsers.length === 0">No hay usuarios con rol soporte</mat-hint>
        <mat-error *ngIf="assignForm.get('userId')?.hasError('required')">Seleccione un agente</mat-error>
      </mat-form-field>
    </form>
  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button mat-stroked-button mat-dialog-close type="button">Cancelar</button>
    <button mat-flat-button color="primary" type="button" [disabled]="!assignForm.valid" (click)="onSubmit()">
      {{ data.ticket.assignedTo ? 'Reasignar' : 'Asignar' }}
    </button>
  </mat-dialog-actions>
</div>
